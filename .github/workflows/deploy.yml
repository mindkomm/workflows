name: Deploy

# Deploy a Composer-managed mindkomm project via mindkomm/deployer.
# Use cases:
#  - Production deploy (push to main, tag, or workflow_dispatch in the caller)
#  - Clone deploy (PR-triggered in the caller, with slug + branch)
#
# The caller is responsible for the trigger; this workflow only runs the deploy.

on:
  workflow_call:
    inputs:
      php-version:
        description: PHP version on the runner
        type: string
        default: '8.3'
      ref:
        description: Git ref to checkout (default — the caller's ref)
        type: string
        default: ''
      host:
        description: Deployer host alias (e.g. production, staging). Empty uses the default selector.
        type: string
        default: ''
      slug:
        description: Instance slug for clone deploys. Empty for plain deploy.
        type: string
        default: ''
      branch:
        description: Branch to deploy on the target. Empty for plain deploy.
        type: string
        default: ''
      composer-args:
        description: Arguments passed to composer install
        type: string
        default: '--prefer-dist --no-progress'
      environment:
        description: 'GitHub Environment name (e.g. production, staging, or clone-<slug>). Required — empty value would make GH reject the environment block.'
        type: string
        required: true
      environment-url:
        description: Optional URL surfaced in the GH UI for this environment.
        type: string
        default: ''
    secrets:
      COMPOSER_AUTH_JSON:
        description: Composer auth JSON for private repositories
        required: false
      DEPLOYER_SSH_KEY:
        description: SSH private key authorized on the deploy target
        required: true

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment-url }}
    env:
      COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: mindkomm/workflows/.github/actions/composer@main
        with:
          PHP_VERSION: ${{ inputs.php-version }}
          COMPOSER_ARGS: ${{ inputs.composer-args }}

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOYER_SSH_KEY }}

      # webfactory/ssh-agent only pre-populates known_hosts for GitHub-targeted
      # keys. The deploy key here targets the hosting server, so we'd otherwise
      # hit `Host key verification failed` on a fresh runner. TOFU is acceptable
      # for this threat model — runners are ephemeral and the deploy is the only
      # SSH exit on this job.
      - name: Disable host key check
        run: |
          mkdir -p ~/.ssh && chmod 0700 ~/.ssh
          echo -e "Host *\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config

      # Clones run with `cancel-in-progress: true` on the caller side, so a
      # cancelled deploy can leave a stale .dep/deploy.lock at the slug path.
      # Production/staging deploys keep their lock semantics — only clear when
      # a slug is provided.
      - name: Clear stale clone lock
        if: inputs.slug != ''
        env:
          DEPLOY_HOST: ${{ inputs.host }}
          DEPLOY_SLUG: ${{ inputs.slug }}
        run: |
          set -euo pipefail
          ARGS=()
          [ -n "$DEPLOY_HOST" ] && ARGS+=("$DEPLOY_HOST")
          ARGS+=("--slug=$DEPLOY_SLUG")
          ./vendor/bin/dep deploy:unlock "${ARGS[@]}" || true

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ inputs.host }}
          DEPLOY_SLUG: ${{ inputs.slug }}
          DEPLOY_BRANCH: ${{ inputs.branch }}
          # A non-empty slug means this is a clone/smoke-test deploy: it has no
          # dedicated web server, and cachetool_web_url targets the canonical
          # host — so the deployer skips OPcache clearing on this run (a missed
          # reset only matters for the long-lived canonical install).
          MIND_CLONE_DEPLOY: ${{ inputs.slug != '' && '1' || '' }}
        run: |
          set -euo pipefail
          ARGS=()
          [ -n "$DEPLOY_HOST" ] && ARGS+=("$DEPLOY_HOST")
          [ -n "$DEPLOY_SLUG" ] && ARGS+=("--slug=$DEPLOY_SLUG")
          [ -n "$DEPLOY_BRANCH" ] && ARGS+=("--branch=$DEPLOY_BRANCH")
          ./vendor/bin/dep deploy -vv "${ARGS[@]}"
