name: Assets

on:
  workflow_call:
    inputs:
      ref:
        description: Branch or ref to checkout and commit to.
        type: string
        default: ''
    secrets:
      READ_PACKAGES_TOKEN:
        description: Token to read packages from GitHub Packages.
        required: true

permissions:
  contents: write

jobs:
  build-assets:
    name: Build & commit assets
    runs-on: ubuntu-latest
    env:
      NPM_AUTH_TOKEN: "${{ secrets.READ_PACKAGES_TOKEN }}"
      NODE_AUTH_TOKEN: "${{ secrets.READ_PACKAGES_TOKEN }}"
    outputs:
      commit_hash: ${{ steps.commit.outputs.commit_hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.head_ref || github.ref_name }}

      - name: PNPM setup
        uses: pnpm/action-setup@v6

      - name: Node setup
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build commands
        run: pnpm run build

      - name: Commit changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "fix(assets): 🤖 Build assets"
