name: Maintenance updates

# Cron-driven dependency update PR generator powered by mindkomm/mind-cli's
# `updates:*` task family. One workflow per level (patch/minor/major) — the
# caller picks the cron + `level`.

on:
  workflow_call:
    inputs:
      level:
        description: 'Update level: patch, minor, or major'
        type: string
        required: true
      php-version:
        description: PHP version on the runner
        type: string
        default: '8.3'
      base-branch:
        description: Base branch to update from
        type: string
        default: main
      mind-version:
        description: '"latest" or a mind-cli release tag (e.g. 1.0.0)'
        type: string
        default: latest
      assignees:
        description: 'Comma-separated GitHub logins to assign on the created PR. Skipped if empty. Typically wired from `vars.UPDATES_ASSIGNEES`.'
        type: string
        default: ''
      reviewers:
        description: 'Comma-separated GitHub logins (or `org/team`) to request review from. Skipped if empty. Typically wired from `vars.UPDATES_REVIEWERS`.'
        type: string
        default: ''
    secrets:
      COMPOSER_AUTH_JSON:
        description: Composer auth JSON for private repositories
        required: false
      UPDATES_PAT:
        description: PAT with contents:write + pull-requests:write on the consumer repo. Required so PRs trigger downstream workflows (default GITHUB_TOKEN does not).
        required: true
      READ_PHAR:
        description: PAT with read access to mindkomm release phars (mind-cli + deployer). Best as an org-level secret since it's identical across mindkomm projects.
        required: true

permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    env:
      COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH_JSON }}
      GH_TOKEN: ${{ secrets.UPDATES_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.UPDATES_PAT }}
          fetch-depth: 0

      # mind-cli is a self-contained phar — no project composer install
      # needed. INSTALL_AND_CACHE: false skips that step but still gives us
      # the right PHP runtime + composer binary (the phar will run `composer
      # update` itself against the consumer's composer.json).
      - uses: mindkomm/workflows/.github/actions/composer@main
        with:
          PHP_VERSION: ${{ inputs.php-version }}
          INSTALL_AND_CACHE: 'false'

      - name: Fetch mind-cli phar
        env:
          # Use the download-only token here, not UPDATES_PAT — UPDATES_PAT is
          # scoped to the consumer repo and won't see mindkomm/mind-cli.
          GH_TOKEN: ${{ secrets.READ_PHAR }}
          MIND_VERSION: ${{ inputs.mind-version }}
        run: |
          set -euo pipefail
          DOWNLOAD_ARGS=(
            --repo mindkomm/mind-cli
            --pattern 'mind.phar'
            -O /tmp/mind.phar
          )
          if [ "$MIND_VERSION" != "latest" ]; then
            DOWNLOAD_ARGS=("$MIND_VERSION" "${DOWNLOAD_ARGS[@]}")
          fi
          gh release download "${DOWNLOAD_ARGS[@]}"

      - name: Run mind updates
        env:
          LEVEL: ${{ inputs.level }}
          BASE: ${{ inputs.base-branch }}
          UPDATES_ASSIGNEES: ${{ inputs.assignees }}
          UPDATES_REVIEWERS: ${{ inputs.reviewers }}
        # -v: show executed commands and their output. CI runs are headless,
        # so verbose mode is the only way to inspect what `composer update`,
        # `gh pr create`, etc. actually did when something goes sideways.
        run: php /tmp/mind.phar -v "updates:${LEVEL}" --base="${BASE}"
